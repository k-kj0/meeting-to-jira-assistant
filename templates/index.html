<html>
  <body>
      <textarea id="transcript" placeholder="Paste meeting transcript here..." rows="6" style="width:100%;"></textarea>

<button onclick="generateTickets()">Generate Tickets</button>

<div id="result"></div>
<script>
async function generateTickets() {
    const transcript = document.getElementById("transcript").value;

    const response = await fetch("/process", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ transcript })
    });

    const data = await response.json();

    const resultDiv = document.getElementById("result");
    resultDiv.innerHTML = "";

    if (data.action_items) {
        data.action_items.forEach(item => {
            const card = document.createElement("div");
            card.innerHTML = `
                <h3>${item.task}</h3>
                <p>${item.assignee}</p>
                <a href="${item.jira_link}" target="_blank">Open Ticket</a>
                <hr/>
            `;
            resultDiv.appendChild(card);
        });
    } else {
        resultDiv.innerText = data.error || "Something went wrong";
    }
}
</script>
</body>
</html>
